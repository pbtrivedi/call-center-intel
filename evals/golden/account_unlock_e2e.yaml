# Golden dataset — end-to-end eval for account unlock scenario
#
# Audio is generated by scripts/generate_test_audio.py
# Run the eval with: python evals/eval_e2e_golden.py
#
# Coverage:
#   audio intake → whisper transcription → PII redaction
#   → summarization → QA scoring → persistence

id: account_unlock_excellent_agent_e2e
description: >
  Synthetic 45-second account-unlock call. Customer (James Miller) is locked
  out before a payment deadline. Agent (Sarah) verifies identity using DOB and
  full SSN, unlocks the account immediately, proactively sends a password-reset
  link, and confirms the payment will go through. Excellent agent performance.
audio_file: data/calls_audio/synthetic_account_unlock.mp3
call_type: account_inquiry

# ── Ground truth (what was actually spoken) ──────────────────────────────────
ground_truth:
  speakers:
    agent:    Sarah
    customer: James Miller
  pii_spoken:
    ssn:      "523-41-6789"
    ssn_last4: "6789"
    dob:      "March 15, 1985"
    dob_year: "1985"
  outcome: account unlocked, password-reset link sent, payment confirmed

# ── Assertions ────────────────────────────────────────────────────────────────

pipeline:
  # Pipeline must finish without error routing to the error node
  expected_status: completed

pii_redaction:
  # Strings that must NOT appear verbatim in the redacted full_text.
  # Whisper typically preserves digit-and-dash format for spoken SSNs.
  must_be_absent:
    - "523-41-6789"   # SSN with dashes (most likely whisper output)
    - "523 41 6789"   # SSN with spaces
    - "523416789"     # SSN bare digits

  # Redactor currently has no DOB pattern — these are KNOWN GAPS.
  # They are listed here so the eval surfaces them as warnings, not failures.
  known_gaps:
    - "1985"              # birth year — no DOB regex in pii_redactor.py
    - "March 15"          # DOB month/day — no DOB regex
    - "March 15, 1985"    # full DOB — no DOB regex

  # pii_redaction_node must have recorded SSN in redacted_types
  must_include_pii_type: SSN

summary:
  resolution_status: resolved   # exact match (lowercase)

  # sentiment_trajectory must contain this substring (case-insensitive)
  sentiment_trajectory_contains: positive

  # call_purpose must contain at least one of these keywords (case-insensitive)
  call_purpose_keywords:
    - unlock
    - locked
    - account
    - password

  # At least this many key_discussion_points
  min_key_discussion_points: 2

qa_scores:
  # Agent was excellent — expect a high overall score
  overall_min: 3.8
  overall_max: 5.0

  # Per-dimension minimums (agent fully resolved issue, was empathetic, professional)
  dimension_mins:
    problem_resolution: 4.0
    professionalism:    3.5
    empathy:            3.0
    clarity:            3.0

compliance:
  # Agent solicited a full SSN over the phone — soft assertion.
  # The QA LLM should flag this as a compliance concern.
  # Marked as a WARNING rather than a hard failure because the LLM is non-deterministic.
  expect_ssn_flag: true   # warn if no flag is found, do not fail the eval

transcript:
  # Whisper assigns neutral SPEAKER_1 / SPEAKER_2 labels; the LLM infers roles.
  # We only assert structural correctness here — speaker accuracy is validated
  # indirectly by the QA and summary scores above (a correct score requires
  # the LLM to have correctly identified which speaker was the agent).
  expected_speaker_count: 2
